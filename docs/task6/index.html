<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task6</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <header></header>

    <!-- main section -->

    <main>
      <div class="left">
        <img src="bus.png" alt="laundrywalah" />
      </div>
      <div class="right">
        <div class="fulllogin">
          <article class="login">
            <section class="welcomemessage">
              <h1>Hello Again!</h1>
              <p>Welcome back! We missed you.</p>
            </section>
            <section class="login">
              <form action="">
                <label for="email">Email:</label>
                <br />
                <input
                  type="email"
                  id="email"
                  name="email"
                  required
                  placeholder="Email@site.com"
                />
                <br />
                <label for="password">Password:</label>
                <br />
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  placeholder="Password"
                />
                <br />
                <a href="#" class="forgot">Forgot Password</a>
                <br />
                <br />
                <button type="submit">Login</button>
              </form>
              <section class="register">
                <p>
                  Not a member?
                  <a href="#" class="registerlink">Register here</a>
                </p>
              </section>
            </section>
          </article>
        </div>
      </div>
    </main>
  </body>
</html>
